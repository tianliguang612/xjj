<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随机小姐姐视频 & 淘宝买家秀</title>
    <style>
        body {
            background-image: url('https://free-img.400040.xyz/4/2026/02/08/69888de882e23.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: rgba(0, 0, 0, 0.5);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Microsoft YaHei', sans-serif;
            overflow: hidden;
        }

        #startBtn {
            background-color: #4CAF50;
            border: none;
            color: white;
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
            box-shadow: 0 4px #999;
            transition-duration: 0.4s;
            font-weight: bold;
            margin: 5px;
            z-index: 5;
        }
        #startBtn:hover {background-color: #45a049}
        #startBtn:active {
            background-color: #3e8e41;
            box-shadow: 0 5px #666;
            transform: translateY(4px);
        }

        .source-selector {
            display: none;
            text-align: center;
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px 20px;
            border-radius: 12px;
            backdrop-filter: blur(5px);
            width: 80%;
            max-width: 300px;
        }
        .source-selector h3 {
            color: white;
            margin-bottom: 20px;
        }
        .source-btn {
            background-color: #FF69B4;
            border: none;
            color: white;
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
            margin: 0 0 15px 0;
            transition: background 0.2s;
            width: 100%;
            box-sizing: border-box;
        }
        .source-btn:hover {
            background-color: #FF1493;
        }

        .video-container {
            position: relative;
            width: 90%;
            max-width: 600px;
            margin-top: 20px;
            display: none;
        }
        .video-container video {
            width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            background: #000;
            display: block;
        }

        .btn-container {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        .ctrl-btn {
            padding: 10px 20px;
            background: rgba(255, 105, 180, 0.8);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
            backdrop-filter: blur(5px);
        }
        .ctrl-btn:hover {
            background: rgba(255, 105, 180, 1);
        }
        #switchSourceBtn {
            background: rgba(30, 144, 255, 0.8);
        }
        #switchSourceBtn:hover {
            background: rgba(30, 144, 255, 1);
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 16px;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 10px;
            display: none;
        }

        /* 淘宝买家秀模式的样式 */
        .taobao-mode {
            display: none; /* 默认隐藏 */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f0f2f5;
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }
        .taobao-container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .taobao-image-container {
            position: relative;
            width: 100%;
            height: 400px;
            background: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .taobao-image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .taobao-loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #666;
        }
        .taobao-spinner {
            width: 30px;
            height: 30px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        .taobao-error {
            color: #e74c3c;
            text-align: center;
            padding: 20px;
        }
        .taobao-button-container {
            padding: 20px;
            text-align: center;
        }
        .taobao-next-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .taobao-next-btn:hover {
            background: #2980b9;
        }
        .taobao-next-btn:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }
        .taobao-back-btn {
            margin-top: 20px;
            background: rgba(100, 100, 100, 0.8);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .taobao-back-btn:hover {
            background: rgba(70, 70, 70, 0.8);
        }

        /* 新的丝袜小姐姐图集界面样式 - 从2.html复制并调整 */
        .sister-image-mode {
            display: none; /* 默认隐藏 */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
            color: white;
            font-family: "Microsoft YaHei", sans-serif;
        }
        .sister-image-mode h1 {
            font-size: 22px; /* 从2.html调整 */
            margin-top: 20px; /* 从2.html调整 */
            margin-bottom: 20px; /* 从2.html调整 */
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        /* 从2.html复制的样式 */
        .btn-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px; /* 从2.html调整 */
            margin-bottom: 20px; /* 从2.html调整 */
        }
        .btn-next {
            padding: 12px 40px; /* 从2.html调整 */
            font-size: 18px; /* 从2.html调整 */
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            font-weight: bold;
            background: linear-gradient(to right, #12c2e9, #c471ed, #f64f59);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn-next:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        .btn-next:active {
            transform: translateY(-1px);
        }
        .btn-next:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        #image-container {
            width: 90%;
            max-width: 600px;
            height: 400px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-top: 5px; /* 从2.html调整 */
            margin-bottom: 20px; /* 从2.html调整 */
            border: 2px dashed rgba(255, 255, 255, 0.3);
        }
        #image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .loading, .error {
            font-size: 16px;
            padding: 20px;
            text-align: center;
        }
        .loading { color: #ccc; }
        .error { color: #ff9d8e; font-weight: bold; }
        .counter {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <button id="startBtn">点击开始</button>

    <div class="source-selector" id="sourceSelector">
        <h3>请选择视频来源</h3>
        <button class="source-btn" id="source1Btn">播放 随机小姐姐1 的视频</button>
        <button class="source-btn" id="source2Btn">播放 随机小姐姐2 的视频</button>
        <!-- 淘宝买家秀按钮 -->
        <button class="source-btn" id="taobaoBtn">淘宝买家秀</button>
        <!-- 在选择来源界面也增加一个图片按钮 -->
        <button class="source-btn" id="imageBtn">查看 小姐姐图片</button>
    </div>

    <div class="video-container" id="videoContainer">
        <video id="videoPlayer" muted playsinline></video>
        <div class="btn-container">
            <button class="ctrl-btn" id="nextBtn">换一个视频</button>
            <button class="ctrl-btn" id="switchSourceBtn">切换来源</button>
            <button class="ctrl-btn" id="muteBtn">静音</button>
            <!-- 在视频播放时也增加一个查看图片的按钮 -->
            <button class="ctrl-btn" id="openImageBtn">小姐姐图片</button>
        </div>
        <div id="loading">正在加载...</div>
    </div>

    <!-- 淘宝买家秀界面 -->
    <div class="taobao-mode" id="taobaoMode">
        <div class="taobao-container">
            <div class="taobao-image-container">
                <div id="taobaoLoading" class="taobao-loading" style="display: block;">
                    <div class="taobao-spinner"></div>
                    <p>正在加载图片...</p>
                </div>
                
                <div id="taobaoError" class="taobao-error" style="display: none;">
                    加载失败，请重试
                </div>
                
                <img id="taobaoImage" alt="淘宝买家秀" style="display: none;">
            </div>
            
            <div class="taobao-button-container">
                <button id="taobaoNextBtn" class="taobao-next-btn">下一张</button>
                <button id="taobaoBackBtn" class="taobao-back-btn">返回主界面</button>
            </div>
        </div>
    </div>

    <!-- 新的丝袜小姐姐图集界面 - 从2.html复制 -->
    <div class="sister-image-mode" id="sisterImageMode">
        <h1>丝袜小姐姐图集</h1>
        <div class="btn-container">
            <button class="btn-next" id="img-next-btn">点击下一张</button>
            <div class="counter" id="img-counter">已加载: 0 张</div>
        </div>
        <div id="image-container">
            <div class="loading">点击上方按钮加载图片...</div>
        </div>
        <button class="ctrl-btn" id="img-back-to-video-btn" style="margin-top: 20px; background: rgba(100, 100, 100, 0.8);">返回视频</button>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const sourceSelector = document.getElementById('sourceSelector');
        const source1Btn = document.getElementById('source1Btn');
        const source2Btn = document.getElementById('source2Btn');
        const taobaoBtn = document.getElementById('taobaoBtn');
        const videoContainer = document.getElementById('videoContainer');
        const video = document.getElementById('videoPlayer');
        const nextBtn = document.getElementById('nextBtn');
        const switchSourceBtn = document.getElementById('switchSourceBtn');
        const muteBtn = document.getElementById('muteBtn');
        const loading = document.getElementById('loading');
        
        const sisterImageMode = document.getElementById('sisterImageMode');
        const imageBtn = document.getElementById('imageBtn');
        const openImageBtn = document.getElementById('openImageBtn');
        const imgBackToVideoBtn = document.getElementById('img-back-to-video-btn');
        const imgNextBtn = document.getElementById('img-next-btn');
        const imgCounter = document.getElementById('img-counter');
        const imageContainer = document.getElementById('image-container');
        
        const taobaoMode = document.getElementById('taobaoMode');
        const taobaoImageElement = document.getElementById('taobaoImage');
        const taobaoLoadingElement = document.getElementById('taobaoLoading');
        const taobaoErrorElement = document.getElementById('taobaoError');
        const taobaoNextBtn = document.getElementById('taobaoNextBtn');
        const taobaoBackBtn = document.getElementById('taobaoBackBtn');

        let isLoading = false;
        let isMuted = false;
        let currentSource = null;
        let isTaobaoLoading = false;
        let isVideoPlaying = false;
        
        // 图片加载相关变量
        const CORS_PROXY = 'https://corsproxy.io/?';
        let imgLoadCount = 0;

        // --- 关键修改：已经将随机小姐姐2的接口更换为 https://api.52vmy.cn/api/video/tianmei ---
        const apiSource1 = 'https://api.lolimi.cn/API/xjj/xjj';
        const apiSource2 = 'https://api.52vmy.cn/api/video/tianmei'; // 已更换为新接口
        const taobaoApiUrl = 'https://yunapi.cn/api/sjtbmjx';

        async function loadAndPlayVideo() {
            if (isLoading || !currentSource) return;
            isLoading = true;
            loading.style.display = 'block';

            try {
                const targetApi = currentSource === 'source1' ? apiSource1 : apiSource2;
                console.log(`正在请求视频源: ${targetApi} (当前来源: ${currentSource})`);
                let videoUrl = '';

                // --- 为不同来源采用不同处理逻辑 ---
                if (currentSource === 'source1') {
                    // 对于apiSource1，直接作为视频地址
                    videoUrl = targetApi + '?t=' + new Date().getTime(); // 添加时间戳防止缓存
                } else {
                    // 对于apiSource2新接口，请求JSON数据
                    console.log('开始请求新接口:', targetApi);
                    const response = await fetch(targetApi);
                    
                    if (!response.ok) {
                        const errorText = await response.text();
                        console.error('接口请求失败:', {
                            status: response.status,
                            statusText: response.statusText,
                            response: errorText
                        });
                        throw new Error(`接口请求失败: ${response.status} ${response.statusText}`);
                    }
                    
                    const data = await response.json();
                    console.log('新接口返回的数据:', data);
                    
                    // 根据您之前提供的截图，解析格式: {"code":200,"msg":"成功","data":{"video":"视频地址"}}
                    if (data.code === 200 && data.data && data.data.video) {
                        videoUrl = data.data.video;
                        console.log('成功提取视频地址:', videoUrl);
                    } else {
                        console.error('接口返回格式不符合预期:', data);
                        // 尝试其他可能的格式
                        if (data.video) videoUrl = data.video;
                        else if (data.url) videoUrl = data.url;
                        else if (data.video_url) videoUrl = data.video_url;
                        else if (data.download_url) videoUrl = data.download_url;
                        
                        if (!videoUrl) {
                            throw new Error('接口返回格式不符合预期，无法提取视频地址');
                        }
                    }
                }

                console.log(`最终获取的视频地址: ${videoUrl}`);
                
                if (!videoUrl) {
                    throw new Error('未能获取到有效的视频地址');
                }

                // 设置视频源并播放
                video.pause();
                video.src = videoUrl;
                video.muted = isMuted;

                // 清除旧的错误监听器
                video.onerror = null;
                video.onloadeddata = null;
                video.oncanplaythrough = null;

                // 设置新的监听器
                const loadTimeout = setTimeout(() => {
                    if (isLoading) {
                        console.warn('视频加载超时');
                        isLoading = false;
                        loading.style.display = 'none';
                        alert('视频加载超时，请重试');
                    }
                }, 10000); // 10秒超时

                video.onloadeddata = () => {
                    clearTimeout(loadTimeout);
                    console.log('视频数据已加载，开始播放');
                    video.play().then(() => {
                        isVideoPlaying = true;
                        isLoading = false;
                        loading.style.display = 'none';
                    }).catch(e => {
                        console.log("自动播放被阻止:", e);
                        isLoading = false;
                        loading.style.display = 'none';
                        // 提示用户点击视频播放
                        alert('视频已加载，请点击视频播放按钮');
                    });
                };

                video.oncanplaythrough = () => {
                    clearTimeout(loadTimeout);
                    console.log('视频可以流畅播放');
                    isLoading = false;
                    loading.style.display = 'none';
                };

                video.onerror = (e) => {
                    clearTimeout(loadTimeout);
                    console.error('视频播放错误:', e);
                    console.error('视频错误详情:', video.error);
                    console.error('视频URL:', videoUrl);
                    
                    isLoading = false;
                    loading.style.display = 'none';
                    isVideoPlaying = false;
                    
                    // 提供更具体的错误信息
                    let errorMsg = '视频加载失败';
                    if (video.error) {
                        switch(video.error.code) {
                            case 1: errorMsg = '视频加载被中止'; break;
                            case 2: errorMsg = '网络错误导致视频加载失败'; break;
                            case 3: errorMsg = '视频解码失败，可能格式不支持'; break;
                            case 4: errorMsg = '视频格式不支持或损坏'; break;
                        }
                    }
                    alert(`${errorMsg}，请重试或切换来源`);
                };

            } catch (error) {
                console.error('播放过程出错:', error);
                console.error('错误堆栈:', error.stack);
                isLoading = false;
                loading.style.display = 'none';
                isVideoPlaying = false;
                alert('播放失败: ' + error.message);
            }
        }

        // 丝袜小姐姐图集图片加载函数 (完全从2.html复制)
        async function loadRandomImage() {
            const container = document.getElementById('image-container');
            container.innerHTML = '<div class="loading">加载中...</div>';
            imgNextBtn.disabled = true;
            imgNextBtn.textContent = '加载中...';

            const types = ['white', 'black'];
            const randomType = types[Math.floor(Math.random() * types.length)];
            const apiUrl = `https://api.lolimi.cn/API/meizi/api?type=${randomType}&_t=${Date.now()}`;

            try {
                const apiResponse = await fetch(apiUrl);
                if (!apiResponse.ok) throw new Error(`接口请求失败: ${apiResponse.status}`);
                
                const jsonData = await apiResponse.json();
                console.log('图片接口返回数据:', jsonData);

                if (jsonData.code === 1 && jsonData.text) {
                    const realImageUrl = jsonData.text;
                    const proxyImageUrl = CORS_PROXY + encodeURIComponent(realImageUrl);
                    
                    const img = new Image();
                    img.onload = function() {
                        container.innerHTML = '';
                        container.appendChild(img);
                        imgLoadCount++;
                        imgCounter.textContent = `已加载: ${imgLoadCount} 张`;
                        imgNextBtn.disabled = false;
                        imgNextBtn.textContent = '点击下一张';
                    };
                    img.onerror = function() {
                        console.warn('代理加载失败，尝试直接加载...');
                        const imgDirect = new Image();
                        imgDirect.onload = function() {
                            container.innerHTML = '';
                            container.appendChild(imgDirect);
                            imgLoadCount++;
                            imgCounter.textContent = `已加载: ${imgLoadCount} 张`;
                            imgNextBtn.disabled = false;
                            imgNextBtn.textContent = '点击下一张';
                        };
                        imgDirect.onerror = function() {
                            container.innerHTML = '<div class="error">图片加载失败，请重试</div>';
                            imgNextBtn.disabled = false;
                            imgNextBtn.textContent = '点击下一张';
                        };
                        imgDirect.src = realImageUrl;
                    };
                    img.src = proxyImageUrl;
                } else {
                    throw new Error('接口返回数据格式异常');
                }
            } catch (error) {
                console.error('图片加载出错:', error);
                container.innerHTML = '<div class="error">加载失败，请检查网络后重试</div>';
                imgNextBtn.disabled = false;
                imgNextBtn.textContent = '点击下一张';
            }
        }

        // 淘宝买家秀图片加载函数
        function loadTaobaoImage() {
            if (isTaobaoLoading) return;
            
            isTaobaoLoading = true;
            taobaoNextBtn.disabled = true;
            taobaoNextBtn.textContent = '加载中...';
            taobaoLoadingElement.style.display = 'block';
            taobaoErrorElement.style.display = 'none';
            taobaoImageElement.style.display = 'none';
            
            try {
                const img = new Image();
                const timestamp = Date.now();
                const imageUrl = `${taobaoApiUrl}?t=${timestamp}`;
                
                img.onload = () => {
                    taobaoImageElement.src = imageUrl;
                    taobaoImageElement.style.display = 'block';
                    taobaoErrorElement.style.display = 'none';
                    
                    isTaobaoLoading = false;
                    taobaoNextBtn.disabled = false;
                    taobaoNextBtn.textContent = '下一张';
                    taobaoLoadingElement.style.display = 'none';
                };
                
                img.onerror = () => {
                    taobaoErrorElement.style.display = 'block';
                    taobaoLoadingElement.style.display = 'none';
                    
                    isTaobaoLoading = false;
                    taobaoNextBtn.disabled = false;
                    taobaoNextBtn.textContent = '下一张';
                };
                
                img.src = imageUrl;
                
            } catch (error) {
                taobaoErrorElement.style.display = 'block';
                taobaoLoadingElement.style.display = 'none';
                
                isTaobaoLoading = false;
                taobaoNextBtn.disabled = false;
                taobaoNextBtn.textContent = '下一张';
            }
        }

        // --- 事件监听器 ---

        startBtn.addEventListener('click', function() {
            startBtn.style.display = 'none';
            sourceSelector.style.display = 'block';
        });

        source1Btn.addEventListener('click', () => {
            currentSource = 'source1';
            sourceSelector.style.display = 'none';
            videoContainer.style.display = 'block';
            loadAndPlayVideo();
        });

        source2Btn.addEventListener('click', () => {
            currentSource = 'source2';
            sourceSelector.style.display = 'none';
            videoContainer.style.display = 'block';
            loadAndPlayVideo();
        });

        taobaoBtn.addEventListener('click', () => {
            sourceSelector.style.display = 'none';
            taobaoMode.style.display = 'flex';
            loadTaobaoImage();
            
            if (video.src && video.src !== '' && !video.paused) {
                video.pause();
                isVideoPlaying = false;
            }
        });

        imageBtn.addEventListener('click', () => {
            sourceSelector.style.display = 'none';
            sisterImageMode.style.display = 'flex';
            loadRandomImage(); // 进入时自动加载第一张图片
        });

        openImageBtn.addEventListener('click', () => {
            videoContainer.style.display = 'none';
            sisterImageMode.style.display = 'flex';
            loadRandomImage(); // 进入时自动加载第一张图片
        });

        nextBtn.addEventListener('click', loadAndPlayVideo);

        switchSourceBtn.addEventListener('click', () => {
            videoContainer.style.display = 'none';
            sourceSelector.style.display = 'block';
            
            if (video.src && video.src !== '' && !video.paused) {
                video.pause();
                isVideoPlaying = false;
            }
        });

        muteBtn.addEventListener('click', () => {
            isMuted = !isMuted;
            video.muted = isMuted;
            muteBtn.textContent = isMuted ? '取消静音' : '静音';
        });

        imgNextBtn.addEventListener('click', loadRandomImage);

        imgBackToVideoBtn.addEventListener('click', () => {
            sisterImageMode.style.display = 'none';
            videoContainer.style.display = 'block';
            
            if (video.src && video.src !== '') {
                video.play().then(() => {
                    console.log("返回视频模式，视频已恢复播放");
                    isVideoPlaying = true;
                }).catch(e => {
                    console.log("浏览器阻止自动播放，需要用户交互:", e);
                    isVideoPlaying = false;
                    alert("视频播放被浏览器阻止，请点击视频或播放按钮");
                });
            } else {
                console.log("没有视频URL，返回选择界面");
                sourceSelector.style.display = 'block';
                videoContainer.style.display = 'none';
            }
        });

        taobaoNextBtn.addEventListener('click', loadTaobaoImage);

        taobaoBackBtn.addEventListener('click', () => {
            taobaoMode.style.display = 'none';
            sourceSelector.style.display = 'block';
            
            if (video.src && video.src !== '' && isVideoPlaying) {
                video.play().then(() => {
                    console.log("从淘宝模式返回，视频已恢复播放");
                }).catch(e => {
                    console.log("恢复播放失败:", e);
                });
            }
        });

        video.addEventListener('ended', () => {
            isVideoPlaying = false;
            loadAndPlayVideo();
        });

        video.addEventListener('play', () => {
            isVideoPlaying = true;
        });

        video.addEventListener('pause', () => {
            isVideoPlaying = false;
        });

        // 可选：在图片模式界面添加键盘支持（按空格键或右箭头键切换图片）
        document.addEventListener('keydown', (event) => {
            if (sisterImageMode.style.display === 'flex') { // 仅在图片模式界面生效
                if (event.code === 'Space' || event.code === 'ArrowRight') {
                    if (!imgNextBtn.disabled) {
                        event.preventDefault();
                        loadRandomImage();
                    }
                }
            }
        });
    </script>
</body>
</html>
