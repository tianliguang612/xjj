<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片查看器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        
        .container {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 600px;
        }
        
        .image-container {
            width: 100%;
            height: 400px;
            margin-bottom: 20px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            position: relative;
            background-color: #f5f5f5;
        }
        
        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        .loading {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #666;
            font-size: 1.2rem;
        }
        
        .btn-container {
            text-align: center;
        }
        
        .next-btn {
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .next-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.6);
        }
        
        .next-btn:active {
            transform: translateY(-1px);
        }
        
        .next-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .info {
            display: none; /* 隐藏信息文本 */
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="image-container">
            <img id="current-image" src="" alt="随机图片">
            <div class="loading" id="loading">图片加载中...</div>
        </div>
        
        <div class="btn-container">
            <button class="next-btn" id="next-btn">下一张图片</button>
        </div>
        
        <div class="info">
            接口地址: https://api.lolimi.cn/API/xjj/lt
        </div>
    </div>

    <script>
        const imageElement = document.getElementById('current-image');
        const nextBtn = document.getElementById('next-btn');
        const loadingElement = document.getElementById('loading');
        
        // 接口地址
        const API_URL = 'https://api.lolimi.cn/API/xjj/lt';
        
        // 防重复点击标志
        let isLoading = false;
        let imageCache = null; // 预加载下一张图片的缓存
        
        // 设置图片
        function setImage(imgUrl) {
            imageElement.src = imgUrl;
            imageElement.onload = () => {
                imageElement.style.opacity = 0;
                imageElement.style.transition = 'opacity 0.5s ease';
                setTimeout(() => {
                    imageElement.style.opacity = 1;
                }, 10);
                hideLoading();
                
                // 图片加载完成后，预加载下一张
                preloadNextImage();
            };
            
            imageElement.onerror = () => {
                hideLoading();
                alert('图片加载失败，请重试！');
            };
        }
        
        // 显示加载动画
        function showLoading() {
            loadingElement.style.display = 'block';
            imageElement.style.opacity = 0.5;
            nextBtn.disabled = true;
            isLoading = true;
        }
        
        // 隐藏加载动画
        function hideLoading() {
            loadingElement.style.display = 'none';
            imageElement.style.opacity = 1;
            nextBtn.disabled = false;
            isLoading = false;
        }
        
        // 获取随机图片
        async function getRandomImage() {
            if (isLoading) return null;
            
            showLoading();
            
            try {
                // 添加时间戳避免缓存
                const timestamp = new Date().getTime();
                const imageUrl = `${API_URL}?t=${timestamp}`;
                
                // 验证图片是否有效
                const testImg = new Image();
                await new Promise((resolve, reject) => {
                    testImg.onload = resolve;
                    testImg.onerror = reject;
                    testImg.src = imageUrl;
                });
                
                return imageUrl;
            } catch (error) {
                console.error('获取图片失败:', error);
                return null;
            }
        }
        
        // 预加载下一张图片
        async function preloadNextImage() {
            if (imageCache) return; // 如果已有缓存，不再重复预加载
            
            try {
                const timestamp = new Date().getTime();
                const preloadUrl = `${API_URL}?t=${timestamp}&preload=true`;
                
                const preloadImg = new Image();
                preloadImg.onload = () => {
                    imageCache = preloadImg.src;
                };
                preloadImg.src = preloadUrl;
            } catch (error) {
                console.log('预加载失败:', error);
            }
        }
        
        // 切换到下一张图片
        async function nextImage() {
            if (isLoading) return;
            
            // 如果有缓存图片，直接使用
            if (imageCache) {
                setImage(imageCache);
                imageCache = null; // 清空缓存
            } else {
                const imageUrl = await getRandomImage();
                if (imageUrl) {
                    setImage(imageUrl);
                }
            }
        }
        
        // 页面加载时显示第一张图片
        window.onload = async () => {
            const imageUrl = await getRandomImage();
            if (imageUrl) {
                setImage(imageUrl);
            }
        };
        
        // 绑定按钮点击事件
        nextBtn.addEventListener('click', nextImage);
        
        // 添加键盘支持（空格键和右箭头键）
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowRight') {
                e.preventDefault(); // 防止空格键滚动页面
                nextImage();
            }
        });
    </script>
</body>
</html>
